<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab1"></ion-back-button>
    </ion-buttons>
    <ion-title>Historial de {{ tipo | titlecase }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list *ngIf="movimientosFiltrados.length > 0">
    <ion-item *ngFor="let item of movimientosFiltrados">
      <ion-label>
        <h2 style="font-weight: bold;">{{ item.destino }}</h2>
        <p>{{ item.fecha | date:'dd/MM/yyyy' }}</p>
      </ion-label>
      <ion-note slot="end" [color]="tipo === 'gasto' ? 'danger' : 'success'" style="font-size: 1.1em;">
        {{ tipo === 'gasto' ? '-' : '+' }}{{ item.monto }} €
      </ion-note>
    </ion-item>
  </ion-list>

  <div *ngIf="movimientosFiltrados.length === 0" class="ion-text-center ion-padding">
    <ion-icon name="wallet-outline" style="font-size: 4em; opacity: 0.3;"></ion-icon>
    <p>No hay registros en esta categoría.</p>
  </div>
</ion-content>
