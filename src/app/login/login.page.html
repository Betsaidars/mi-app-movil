<ion-content class="ion-padding auth-bg">
  <div class="auth-container">
    <div class="logo-section">
      <ion-icon name="wallet-outline"></ion-icon>
      <h1>MiBilletera</h1>
    </div>

    <ion-card mode="ios">
      <ion-card-content>
        <form [formGroup]="loginForm">
          
          <ion-item lines="full">
            <ion-label position="stacked">Email</ion-label>
            <ion-input formControlName="email" type="email" placeholder="ejemplo@correo.com"></ion-input>
          </ion-item>
          <ion-text color="danger" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
            <p class="error-text">Formato de email no válido.</p>
          </ion-text>

          <ion-item lines="full" class="ion-margin-top">
            <ion-label position="stacked">Contraseña</ion-label>
            <ion-input 
              formControlName="password" 
              [type]="passwordOculta ? 'password' : 'text'" 
              placeholder="********">
              
              <ion-button fill="clear" slot="end" (click)="togglePassword()" class="eye-button">
                <ion-icon slot="icon-only" [name]="passwordOculta ? 'eye-outline' : 'eye-off-outline'"></ion-icon>
              </ion-button>
            </ion-input>
          </ion-item>
          <ion-text color="danger" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
            <p class="error-text">La contraseña debe tener al menos 8 caracteres.</p>
          </ion-text>

          <ion-button expand="block" (click)="entrar()" [disabled]="loginForm.invalid" class="ion-margin-top">
            Iniciar Sesión
          </ion-button>
        </form>
        
        <ion-button expand="block" fill="clear" color="white" (click)="irARegistro()">
          ¿No tienes cuenta? Regístrate
        </ion-button>

      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
